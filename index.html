<!doctype html><html><head>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<link rel='manifest' href='manifest.json'>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
const KEY='pack';
function save(){localStorage.setItem(KEY,JSON.stringify([...document.querySelectorAll('input')].map(x=>x.checked)))}
window.onload=()=>{let s=JSON.parse(localStorage.getItem(KEY)||'[]');document.querySelectorAll('input').forEach((b,i)=>{b.checked=s[i]||false;b.onchange=save})}
</script></head><body><h1>Pefkochori PWA</h1>
<label><input type=checkbox>Jardiance</label><br>
<label><input type=checkbox>Irbesartan</label>
</body></html>

<div>

<div style="font-size:18px">🌤️ Live Wetter • <span id='liveMinMax'>28° / 13°</span></div>
</div>
<div style="font-size:60px">🌤️</div>
</div>

<div style="margin-top:18px;background:rgba(255,255,255,.08);padding:14px;border-radius:18px">
<div style="display:flex;justify-content:space-between;font-size:26px">
<span>🌙</span><span>🌅</span><span>☀️</span><span>☀️</span><span>☀️</span><span>🌤️</span><span>🌙</span>

<div style="flex:1;background:rgba(255,255,255,.08);padding:12px;border-radius:16px">🌧️ 0% Regen</div>

</div>
<div class='card'><h2>💊 Medikamente</h2><label><input type='checkbox'>Jardiance 10 mg</label><label><input type='checkbox'>Irbesartan 75 mg</label></div>
<div class='card'><h2>📄 Dokumente</h2><label><input type='checkbox'>Reisepass oder Personalausweis</label><label><input type='checkbox'>Flugtickets / Boardingpass</label><label><input type='checkbox'>Hotelbuchung</label><label><input type='checkbox'>Krankenversicherungskarte</label><label><input type='checkbox'>Führerschein</label><label><input type='checkbox'>EC-/Kreditkarte</label><label><input type='checkbox'>Etwas Bargeld</label><label><input type='checkbox'>Handy + Ladegerät</label><label><input type='checkbox'>Powerbank</label><label><input type='checkbox'>Kopfhörer</label></div><div class='card'><h2>📱 Technik</h2><label><input type='checkbox'>Handy</label><label><input type='checkbox'>Ladekabel</label><label><input type='checkbox'>Mehrfachstecker</label><label><input type='checkbox'>Adapter</label><label><input type='checkbox'>Kamera (optional)</label><label><input type='checkbox'>E-Book/Tablet (optional)</label></div><div class='card'><h2>🧴 Hygiene & Pflege</h2><label><input type='checkbox'>Zahnbürste + Zahnpasta</label><label><input type='checkbox'>Shampoo / Duschgel</label><label><input type='checkbox'>Deo</label><label><input type='checkbox'>Bürste/Kamm</label><label><input type='checkbox'>Rasierer</label><label><input type='checkbox'>Sonnencreme</label><label><input type='checkbox'>After Sun</label><label><input type='checkbox'>Lippenpflege</label><label><input type='checkbox'>Pflaster</label><label><input type='checkbox'>Mückenspray</label></div><div class='card'><h2>🏖️ Strand</h2><label><input type='checkbox'>Badetasche</label><label><input type='checkbox'>Strandtuch</label><label><input type='checkbox'>Sonnenbrille</label><label><input type='checkbox'>Flip-Flops</label><label><input type='checkbox'>Wasserdichte Handyhülle</label><label><input type='checkbox'>Schnorchelset</label></div><div class='card'><h2>👕 Männer</h2><label><input type='checkbox'>8–10 T-Shirts/Hemden</label><label><input type='checkbox'>4–5 Shorts</label><label><input type='checkbox <script>
async function loadWeather(){
try{
const lat=39.99, lon=23.61;
const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
const data=await res.json();

document.getElementById("liveTemp").innerText=Math.round(data.current.temperature_2m)+"°";
document.getElementById("liveMinMax").innerText=
Math.round(data.daily.temperature_2m_max[0])+"° / "+
Math.round(data.daily.temperature_2m_min[0])+"°";
}catch(e){}
}
loadWeather();
</script>
</body></html>
